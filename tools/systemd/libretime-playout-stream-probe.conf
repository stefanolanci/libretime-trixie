# Drop-in for libretime-playout: log Icecast/HTTP stream loudness via ffmpeg volumedetect.
# Install: cp to /etc/systemd/system/libretime-playout.service.d/stream-probe.conf
#          systemctl daemon-reload && systemctl restart libretime-playout
# Adjust URL to your local Icecast mount (listener URL, not source password).
[Service]
Environment=LIBRETIME_STREAM_PROBE_URL=http://127.0.0.1:8000/main
Environment=LIBRETIME_STREAM_PROBE_INTERVAL=20
