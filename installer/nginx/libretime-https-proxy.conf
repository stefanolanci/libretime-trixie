# Public reverse proxy (HTTP/HTTPS) → LibreTime on the internal listen port.
# When installing with an https:// public URL, the install script enables this
# vhost and runs Certbot; Certbot adds the listen 443 ssl block to this file.
server {
  listen 80;
  listen [::]:80;

  server_name @@SERVER_NAME@@;

  access_log /var/log/nginx/libretime-proxy.access.log;
  error_log /var/log/nginx/libretime-proxy.error.log;

  client_max_body_size 512M;
  client_body_timeout 300s;

  location / {
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;

    proxy_pass http://127.0.0.1:@@UPSTREAM_PORT@@/;
  }
}
