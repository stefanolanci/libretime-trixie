# Fail2ban action — kill existing ESTABLISHED TCP sockets of a banned IP,
# SCOPED to the ports of the jail that issued the ban.
#
# Rationale: the default nftables/iptables banaction only drops packets with
# ct state NEW from the banned IP, so connections already ESTABLISHED before
# the ban keep flowing (HTTP keep-alive, long-lived Icecast sockets, etc.).
# This action forces the kernel to close those sockets using `ss -K` from
# iproute2 (no extra package; requires CONFIG_INET_DIAG_DESTROY=y, default
# on Debian/Ubuntu kernels).
#
# IMPORTANT: the kill is restricted to the <ports> of THIS jail. Other sockets
# of the banned IP (including sockets to unrelated services on this host) are
# NOT touched — each jail keeps its own independent effect.
#
# Usage (from a jail definition):
#   action = %(action_)s
#            libretime-conntrack-flush[ports="8000,8443"]

[Init]
# Comma-separated list of TCP ports owned by the jail's service.
# Overridden by the jail definition.
ports =

[Definition]

actionstart =
actionstop =
actioncheck =

# For each port in <ports>, destroy:
#   - accepted sockets on the local server:  sport = :$p  AND  dst = <ip>
#   - outbound sockets to that port:         dport = :$p  AND  src = <ip>
# Errors are swallowed so a missing feature never prevents the ban itself.
actionban = for p in $(echo '<ports>' | tr ',' ' '); do \
              ss -K state established "sport = :$p and dst <ip>" > /dev/null 2>&1 || true; \
              ss -K state established "dport = :$p and src <ip>" > /dev/null 2>&1 || true; \
            done

actionunban =
