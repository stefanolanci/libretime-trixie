# LibreTime-related fail2ban jails (drop-in for /etc/fail2ban/jail.d/)
#
# Policy aligned with stock sshd jail on this fork: maxretry=5, findtime=3600 (1h),
# bantime=1800 (30 minutes) for these services.
#
# Install (Debian): handled by the LibreTime ./install script when
# --setup-fail2ban (or the wizard) is selected. The installer materializes
# @LIBRETIME_NGINX_ACCESS_LOG@ to the correct nginx access log path
# depending on HTTP vs HTTPS deployment mode:
#   HTTP  -> /var/log/nginx/libretime.access.log
#   HTTPS -> /var/log/nginx/libretime-proxy.access.log
# Manual install (if deploying this file by hand) requires the same
# substitution before running: sudo fail2ban-client reload
#
# Harbor jail requires Liquidsoap logs to include client IP on auth failure (ls_script.liq).

[libretime-harbor]

enabled = true
filter = libretime-harbor
logpath = /var/log/libretime/harbor-auth.log
port = 8001,8002
protocol = tcp
maxretry = 5
findtime = 3600
bantime = 1800

[icecast-auth]

enabled = true
filter = icecast-auth
logpath = /var/log/icecast2/access.log
port = 8000,8443
protocol = tcp
maxretry = 5
findtime = 3600
bantime = 1800
# Cut existing ESTABLISHED sockets of the banned IP, SCOPED to Icecast ports only.
# The ban remains strictly per-service: connections of this IP to other
# services (nginx, harbor, ssh, …) are not touched.
action = %(action_)s
         libretime-conntrack-flush[ports="8000,8443"]

[nginx-libretime-login]

enabled = true
filter = nginx-libretime-login
logpath = @LIBRETIME_NGINX_ACCESS_LOG@
# @LIBRETIME_NGINX_PORTS@ is replaced at install time with LibreTime's actual
# nginx listen ports (HTTP mode: "8080"; HTTPS mode: "80,443"). fail2ban uses
# this value both to generate the nftables reject rule and to scope the
# conntrack-flush action below — so ban and socket kill always target the
# exact same set of ports.
port = @LIBRETIME_NGINX_PORTS@
protocol = tcp
maxretry = 5
findtime = 3600
bantime = 1800
# Cut existing ESTABLISHED sockets of the banned IP, SCOPED to the nginx
# ports only. Without this, HTTP keep-alive TCP sessions opened before the
# ban would survive and let the client keep hitting /login.
action = %(action_)s
         libretime-conntrack-flush[ports="@LIBRETIME_NGINX_PORTS@"]
