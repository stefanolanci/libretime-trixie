# LibreTime-related fail2ban jails (drop-in for /etc/fail2ban/jail.d/)
#
# Policy aligned with stock sshd jail on this fork: maxretry=5, findtime=3600 (1h),
# bantime=600 (10 minutes) for these services.
#
# Install (Debian):
#   sudo cp -a installer/fail2ban/filter.d/*.conf /etc/fail2ban/filter.d/
#   sudo cp -a installer/fail2ban/jail.d/91-libretime.conf /etc/fail2ban/jail.d/
#   sudo fail2ban-client reload
#
# Harbor jail requires Liquidsoap logs to include client IP on auth failure (ls_script.liq).

[libretime-harbor]

enabled = true
filter = libretime-harbor
backend = systemd
journalmatch = _SYSTEMD_UNIT=libretime-liquidsoap.service
port = 8001,8002
protocol = tcp
maxretry = 5
findtime = 3600
bantime = 600

[icecast-auth]

enabled = true
filter = icecast-auth
logpath = /var/log/icecast2/access.log
port = 8000,8443
protocol = tcp
maxretry = 5
findtime = 3600
bantime = 600

[nginx-libretime-login]

enabled = true
filter = nginx-libretime-login
logpath = /var/log/nginx/libretime-proxy.access.log
port = http,https
maxretry = 5
findtime = 3600
bantime = 600
