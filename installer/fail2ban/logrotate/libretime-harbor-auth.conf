# Rotate the dedicated Harbor authentication log written by ls_script.liq.
# No postrotate hook is needed because Liquidsoap's file.write(append=true)
# opens and closes the file for every auth event, so it always picks up the
# new inode on the next attempt after rotation.
/var/log/libretime/harbor-auth.log {
  su @@USER@@ adm
  weekly
  rotate 12
  compress
  delaycompress
  missingok
  notifempty
  create 0640 @@USER@@ adm
}
