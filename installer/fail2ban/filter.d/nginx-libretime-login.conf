# Fail2ban filter — LibreTime web login brute force (HTTPS reverse proxy access log)
# Wrong password keeps user on /login with HTTP 200; success uses 302 to showbuilder.
# Example:
#   203.0.113.10 - - [22/Apr/2026:02:29:52 +0200] "POST /login HTTP/1.1" 200 3183

[Definition]

failregex = ^<HOST> -.*"POST /login HTTP/[^"]+" 200\b

ignoreregex =
