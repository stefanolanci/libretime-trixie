# Fail2ban filter — LibreTime Liquidsoap Harbor (live mounts)
# Matches journal lines emitted by ls_script.liq after client address is logged, e.g.:
#   ... [main_input:2] user 'mic' auth failed from 203.0.113.10
#
# Requires jail backend=systemd and journalmatch on libretime-liquidsoap.service

[Definition]

failregex = ^.*\] user '[^']*' auth failed from <HOST>\s*$

ignoreregex =
