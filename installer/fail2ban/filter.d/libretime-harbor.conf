# Fail2ban filter — LibreTime Liquidsoap Harbor (live mounts)
# Reads the dedicated log file written by ls_script.liq auth_handler:
#   libretime-harbor[main] status=auth_failed ip=203.0.113.10
#
# The file is appended by the Liquidsoap process itself via file.write(),
# so it is immune to the fail2ban 1.1.0 + python-systemd journal bug observed
# on Debian 13 Trixie (backend=systemd did not pick up _SYSTEMD_UNIT matches
# reliably for libretime-liquidsoap.service).
#
# No timestamp in the line: fail2ban uses the write time of the log file
# (datepattern matches line start only, so the default "now" fallback kicks in).

[Definition]

failregex = ^libretime-harbor\[[^\]]+\] status=auth_failed ip=<HOST>\s*$

ignoreregex =

datepattern = {^LN-BEG}
